<template>
  <article class="slds-card">
    <div class="slds-card__header slds-grid">
      <header class="slds-media slds-media_center slds-has-flexi-truncate">
        <div class="slds-media__body">
          <h2 class="slds-card__header-title">
            <span>Error Queue</span>
          </h2>
          <p class="slds-text-body_small slds-text-color_weak">
            Touches that are unresolved, ambiguous, or errored. Retry once the
            upstream data is corrected, or ignore to archive.
          </p>
        </div>
        <div class="slds-no-flex slds-text-body_small slds-text-color_weak">
          <span data-test="count-label">{countLabel}</span>
        </div>
      </header>
    </div>

    <div class="slds-card__body slds-card__body_inner">
      <template if:true={isLoading}>
        <div class="slds-align_absolute-center slds-p-around_medium">
          <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </div>
      </template>

      <template if:true={hasError}>
        <div
          class="slds-text-color_error slds-p-around_small"
          data-test="error"
        >
          {errorMessage}
        </div>
      </template>

      <template if:true={hasData}>
        <template if:true={isEmpty}>
          <p
            class="slds-text-body_regular slds-text-align_center slds-p-around_medium"
            data-test="empty"
          >
            No touches require attention.
          </p>
        </template>

        <template if:false={isEmpty}>
          <lightning-datatable
            key-field="id"
            data={rows}
            columns={columns}
            hide-checkbox-column
            suppress-bottom-bar
            onrowaction={handleRowAction}
            data-test="touches-table"
          ></lightning-datatable>
        </template>
      </template>
    </div>
  </article>
</template>
